version: 1
project:
    name: instancez-dev
    description: Local development project
server:
    port: 8080
    cors:
        origins:
            - '*'
    timeouts:
        request: 30s
        db_query: 10s
        upload: 5m
        shutdown: 30s
    max_body_size: 10MB
    max_limit: 1000
database:
    pool:
        max: 10
        min: 2
        idle_timeout: 300s
providers:
    email: null
    storage:
        type: local
auth:
    jwt_expiry: 15m
    refresh_tokens: true
    refresh_token_expiry: 7d
    # allow_signup: false       # admin-only: POST /auth/v1/signup → 403 signup_disabled
    # allow_anonymous: false    # block empty-body anonymous sign-in
    email: null
    # OAuth providers are keyed by name (google, github, …). Use env-var
    # interpolation for the secrets. See docs build/auth.
    oauth: {}
    # oauth:
    #     google:
    #         client_id: YOUR_GOOGLE_CLIENT_ID
    #         client_secret: ${INSTANCEZ_ENV_GOOGLE_CLIENT_SECRET}
    #         redirect_url: https://myapp.example.com/auth/callback/google
    #     github:
    #         client_id: YOUR_GITHUB_CLIENT_ID
    #         client_secret: ${INSTANCEZ_ENV_GITHUB_CLIENT_SECRET}
    #         redirect_url: https://myapp.example.com/auth/callback/github
tables:
    # Profile data lives in a regular user-defined table FK'd to auth.users.id.
    # Uncomment and adjust to suit your app.
    #
    # profiles:
    #     fields:
    #         - name: id
    #           foreign_key:
    #               references: auth.users.id
    #               on_delete: cascade
    #           primary_key: true
    #         - name: avatar_url
    #           type: text
    #         - name: display_name
    #           type: text
    #     rls:
    #         - operations: [select]
    #           using: "true"
    #         - operations: [update]
    #           using: "auth.uid() = id"
    announcements:
        fields:
            - name: body
              type: text
              required: true
            - name: created_at
              type: timestamptz
              required: true
              default: now()
            - name: id
              type: bigserial
              primary_key: true
            - name: published
              type: boolean
              required: true
              default: false
            - name: published_at
              type: timestamptz
            - name: title
              type: text
              required: true
        indexes: []
        rls:
            - operations:
                - select
              using: published = true
            - operations:
                - insert
              with_check: |
                auth.uid() IN (
                  SELECT user_id FROM team_members WHERE role = 'owner'
                )
            - operations:
                - update
              using: |
                auth.uid() IN (
                  SELECT user_id FROM team_members WHERE role = 'owner'
                )
              with_check: |
                auth.uid() IN (
                  SELECT user_id FROM team_members WHERE role = 'owner'
                )
            - operations:
                - delete
              using: |
                auth.uid() IN (
                  SELECT user_id FROM team_members WHERE role = 'owner'
                )
    categories:
        fields:
            - name: color
              type: varchar(7)
              default: '#6366f1'
            - name: id
              type: bigserial
              primary_key: true
            - name: name
              type: text
              required: true
            - name: team_id
              foreign_key:
                  references: teams.id
                  on_delete: cascade
        indexes:
            - columns:
                - team_id
                - name
              unique: true
              where: ""
        rls:
            - operations:
                - select
                - insert
                - update
                - delete
              using: team_id IN (SELECT team_id FROM team_members WHERE user_id = auth.uid())
              with_check: team_id IN (SELECT team_id FROM team_members WHERE user_id = auth.uid())
    comments:
        fields:
            - name: body
              type: text
              required: true
            - name: created_at
              type: timestamptz
              required: true
              default: now()
            - name: id
              type: bigserial
              primary_key: true
            - name: todo_id
              foreign_key:
                  references: todos.id
                  on_delete: cascade
            - name: user_id
              foreign_key:
                  references: auth.users.id
                  on_delete: cascade
        indexes:
            - columns:
                - todo_id
                - created_at
              unique: false
              where: ""
        rls:
            - operations:
                - select
              using: |
                todo_id IN (
                  SELECT id FROM todos
                  WHERE team_id IN (SELECT team_id FROM team_members WHERE user_id = auth.uid())
                )
            - operations:
                - insert
              with_check: user_id = auth.uid()
            - operations:
                - delete
              using: user_id = auth.uid()
    some_table:
        fields:
            - name: created_at
              type: timestamptz
              default: now()
            - name: id
              type: bigserial
              primary_key: true
        indexes: []
        rls: []
    team_members:
        fields:
            - name: id
              type: bigserial
              primary_key: true
            - name: joined_at
              type: timestamptz
              required: true
              default: now()
            - name: role
              type: text
              required: true
              enum:
                  - owner
                  - admin
                  - member
            - name: team_id
              type: bigint
              foreign_key:
                  references: teams.id
                  on_delete: cascade
            - name: user_id
              foreign_key:
                  references: auth.users.id
                  on_delete: cascade
        indexes:
            - columns:
                - team_id
                - user_id
              unique: true
              where: ""
            - columns:
                - user_id
              unique: false
              where: ""
        rls:
            - operations:
                - select
              using: team_id IN (SELECT team_id FROM team_members WHERE user_id = auth.uid())
            - operations:
                - insert
              with_check: |
                team_id IN (
                  SELECT team_id FROM team_members
                  WHERE user_id = auth.uid() AND role IN ('owner', 'admin')
                )
            - operations:
                - delete
              using: |
                team_id IN (
                  SELECT team_id FROM team_members
                  WHERE user_id = auth.uid() AND role = 'owner'
                )
    teams:
        fields:
            - name: created_at
              type: timestamptz
              required: true
              default: now()
            - name: id
              type: bigserial
              primary_key: true
            - name: name
              type: text
              required: true
            - name: slug
              type: varchar(63)
              required: true
        indexes:
            - columns:
                - slug
              unique: true
              where: ""
        rls:
            - operations:
                - select
              using: id IN (SELECT team_id FROM team_members WHERE user_id = auth.uid())
            - operations:
                - insert
              with_check: auth.is_authenticated()
            - operations:
                - update
              using: |
                id IN (
                  SELECT team_id FROM team_members
                  WHERE user_id = auth.uid() AND role = 'owner'
                )
            - operations:
                - delete
              using: |
                id IN (
                  SELECT team_id FROM team_members
                  WHERE user_id = auth.uid() AND role = 'owner'
                )
    todos:
        fields:
            - name: body
              type: text
            - name: category_id
              foreign_key:
                  references: categories.id
                  on_delete: set_null
            - name: created_at
              type: timestamptz
              required: true
              default: now()
            - name: done_at
              type: timestamptz
            - name: due_date
              type: date
            - name: id
              type: bigserial
              primary_key: true
            - name: priority
              type: integer
              required: true
              default: 0
              min: 0
              max: 5
            - name: status
              type: text
              required: true
              default: pending
              enum:
                  - pending
                  - active
                  - done
            - name: team_id
              foreign_key:
                  references: teams.id
                  on_delete: cascade
            - name: title
              type: text
              required: true
            - name: updated_at
              type: timestamptz
            - name: user_id
              foreign_key:
                  references: auth.users.id
                  on_delete: cascade
        indexes:
            - columns:
                - team_id
                - status
              unique: false
              where: ""
            - columns:
                - user_id
                - created_at
              unique: false
              where: ""
            - columns:
                - due_date
              unique: false
              where: status != 'done'
        rls:
            - operations:
                - select
              using: team_id IN (SELECT team_id FROM team_members WHERE user_id = auth.uid())
            - operations:
                - insert
              with_check: |
                team_id IN (SELECT team_id FROM team_members WHERE user_id = auth.uid()) AND user_id = auth.uid()
            - operations:
                - update
              using: user_id = auth.uid()
            - operations:
                - delete
              using: user_id = auth.uid()
storage:
    another_bucket:
        max_size: 5MB
        types:
            - image/*
        public: false
        rls: []
    some_bucket:
        max_size: 5MB
        types:
            - image/*
        public: false
        rls: []
rpc:
    team_stats:
        description: Get team statistics
        auth_required: true
        language: sql
        volatility: stable
        security: invoker
        args:
            - name: team_id
              type: bigint
              required: true
        returns:
            type: "record"
        body: |
            SELECT
              (SELECT COUNT(*) FROM todos WHERE team_id = team_stats.team_id) AS todo_count,
              (SELECT COUNT(*) FROM todos WHERE team_id = team_stats.team_id AND status = 'done') AS completed_count,
              (SELECT COUNT(*) FROM team_members WHERE team_id = team_stats.team_id) AS member_count
