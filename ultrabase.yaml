version: 1
project:
    name: Ultrabase Devx
    description: Local development project
extensions:
    - pgcrypto
    - pg_trgm
server:
    port: 8080
    cors:
        origins:
            - '*'
        methods:
            - GET
            - POST
            - PATCH
            - DELETE
            - OPTIONS
        headers:
            - Authorization
            - Content-Type
        credentials: false
        max_age: 86400
    timeouts:
        request: 30s
        db_query: 10s
        upload: 5m
        shutdown: 30s
    max_body_size: 10MB
    docs_ui: true
    max_limit: 1000
database:
    pool:
        max: 10
        min: 2
        idle_timeout: 300s
providers:
    email: null
    storage:
        type: local
auth:
    jwt_expiry: 15m
    refresh_tokens: true
    refresh_token_expiry: 7d
    email: null
    google: null
    github: null
tables:
    users:
        fields:
            - name: avatar_url
              type: text
            - name: display_name
              type: text
    announcements:
        fields:
            - name: body
              type: text
              required: true
            - name: created_at
              type: timestamptz
              required: true
              default: now()
            - name: id
              type: bigserial
              primary_key: true
            - name: published
              type: boolean
              required: true
              default: false
            - name: published_at
              type: timestamptz
            - name: title
              type: text
              required: true
        indexes: []
        rls:
            - operations:
                - select
              check: published = true
            - operations:
                - insert
                - update
                - delete
              check: |
                auth.uid() IN (
                  SELECT user_id FROM team_members WHERE role = 'owner'
                )
        allow_anon: true
        searchable:
            - title
            - body
        search_config: ""
    categories:
        fields:
            - name: color
              type: varchar(7)
              default: '#6366f1'
            - name: id
              type: bigserial
              primary_key: true
            - name: name
              type: text
              required: true
            - name: team_id
              foreign_key:
                  references: teams.id
                  on_delete: cascade
        indexes:
            - columns:
                - team_id
                - name
              unique: true
              where: ""
        rls:
            - operations:
                - select
                - insert
                - update
                - delete
              check: team_id IN (SELECT team_id FROM team_members WHERE user_id = auth.uid())
        allow_anon: false
        searchable: []
        search_config: ""
    comments:
        fields:
            - name: body
              type: text
              required: true
            - name: created_at
              type: timestamptz
              required: true
              default: now()
            - name: id
              type: bigserial
              primary_key: true
            - name: todo_id
              foreign_key:
                  references: todos.id
                  on_delete: cascade
            - name: user_id
              foreign_key:
                  references: users.id
                  on_delete: cascade
        indexes:
            - columns:
                - todo_id
                - created_at
              unique: false
              where: ""
        rls:
            - operations:
                - select
              check: |
                todo_id IN (
                  SELECT id FROM todos
                  WHERE team_id IN (SELECT team_id FROM team_members WHERE user_id = auth.uid())
                )
            - operations:
                - insert
              check: user_id = auth.uid()
            - operations:
                - delete
              check: user_id = auth.uid()
        allow_anon: false
        searchable: []
        search_config: ""
    some_table:
        fields:
            - name: created_at
              type: timestamptz
              default: now()
            - name: id
              type: bigserial
              primary_key: true
        indexes: []
        rls: []
        allow_anon: false
        searchable: []
        search_config: english
    team_members:
        fields:
            - name: id
              type: bigserial
              primary_key: true
            - name: joined_at
              type: timestamptz
              required: true
              default: now()
            - name: role
              type: text
              required: true
              enum:
                  - owner
                  - admin
                  - member
            - name: team_id
              type: bigint
              foreign_key:
                  references: teams.id
                  on_delete: cascade
            - name: user_id
              foreign_key:
                  references: users.id
                  on_delete: cascade
        indexes:
            - columns:
                - team_id
                - user_id
              unique: true
              where: ""
            - columns:
                - user_id
              unique: false
              where: ""
        rls:
            - operations:
                - select
              check: team_id IN (SELECT team_id FROM team_members WHERE user_id = auth.uid())
            - operations:
                - insert
              check: |
                team_id IN (
                  SELECT team_id FROM team_members
                  WHERE user_id = auth.uid() AND role IN ('owner', 'admin')
                )
            - operations:
                - delete
              check: |
                team_id IN (
                  SELECT team_id FROM team_members
                  WHERE user_id = auth.uid() AND role = 'owner'
                )
        allow_anon: false
        searchable: []
        search_config: ""
    teams:
        fields:
            - name: created_at
              type: timestamptz
              required: true
              default: now()
            - name: id
              type: bigserial
              primary_key: true
            - name: name
              type: text
              required: true
            - name: slug
              type: varchar(63)
              required: true
        indexes:
            - columns:
                - slug
              unique: true
              where: ""
        rls:
            - operations:
                - select
              check: id IN (SELECT team_id FROM team_members WHERE user_id = auth.uid())
            - operations:
                - insert
              check: auth.is_authenticated()
            - operations:
                - update
                - delete
              check: |
                id IN (
                  SELECT team_id FROM team_members
                  WHERE user_id = auth.uid() AND role = 'owner'
                )
        allow_anon: false
        searchable: []
        search_config: ""
    todos:
        fields:
            - name: body
              type: text
            - name: category_id
              foreign_key:
                  references: categories.id
                  on_delete: set_null
            - name: created_at
              type: timestamptz
              required: true
              default: now()
            - name: done_at
              type: timestamptz
            - name: due_date
              type: date
            - name: id
              type: bigserial
              primary_key: true
            - name: priority
              type: integer
              required: true
              default: 0
              min: 0
              max: 5
            - name: status
              type: text
              required: true
              default: pending
              enum:
                  - pending
                  - active
                  - done
            - name: team_id
              foreign_key:
                  references: teams.id
                  on_delete: cascade
            - name: title
              type: text
              required: true
            - name: updated_at
              type: timestamptz
            - name: user_id
              foreign_key:
                  references: users.id
                  on_delete: cascade
        indexes:
            - columns:
                - team_id
                - status
              unique: false
              where: ""
            - columns:
                - user_id
                - created_at
              unique: false
              where: ""
            - columns:
                - due_date
              unique: false
              where: status != 'done'
        rls:
            - operations:
                - select
              check: team_id IN (SELECT team_id FROM team_members WHERE user_id = auth.uid())
            - operations:
                - insert
              check: |
                team_id IN (SELECT team_id FROM team_members WHERE user_id = auth.uid()) AND user_id = auth.uid()
            - operations:
                - update
                - delete
              check: user_id = auth.uid()
        allow_anon: false
        searchable:
            - title
            - body
        search_config: english
storage:
    another_bucket:
        max_size: 5MB
        types:
            - image/*
        public: false
        rls: []
    some:
        max_size: 5MB
        types:
            - image/*
        public: false
        rls: []
"on":
    welcome_hook:
        events:
            - users.insert
        schedule: ""
        webhook:
            url: https://httpbin.org/post
            headers:
                X-Source: ultrabase
            retry:
                max: 3
                backoff: exponential
        email: null
functions:
    team_stats:
        description: Get team statistics
        auth_required: true
        language: sql
        volatility: stable
        security: invoker
        args:
            - name: team_id
              type: bigint
              required: true
        returns:
            type: "record"
        body: |
            SELECT
              (SELECT COUNT(*) FROM todos WHERE team_id = team_stats.team_id) AS todo_count,
              (SELECT COUNT(*) FROM todos WHERE team_id = team_stats.team_id AND status = 'done') AS completed_count,
              (SELECT COUNT(*) FROM team_members WHERE team_id = team_stats.team_id) AS member_count
seeds:
    announcements:
        - body: This is a sample announcement.
          published: true
          title: Welcome to Ultrabase
    teams:
        - id: 1
          name: Acme Corp
          slug: acme
