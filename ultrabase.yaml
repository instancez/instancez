"on":
    welcome_hook:
        events:
            - users.insert
        schedule: ""
        webhook:
            url: https://httpbin.org/post
            headers:
                X-Source: ultrabase
            retry:
                max: 3
                backoff: exponential
        email: null
functions:
    fb:
        description: ""
        method: GET
        query: SELECT 1;
        params: {}
        returns:
            type: rows
            schema: {}
        auth_required: true
    team_stats:
        description: Get team statistics
        method: GET
        query: |
            SELECT
              (SELECT COUNT(*) FROM todos WHERE team_id = $1) AS todo_count,
              (SELECT COUNT(*) FROM todos WHERE team_id = $1 AND status = 'done') AS completed_count,
              (SELECT COUNT(*) FROM team_members WHERE team_id = $1) AS member_count
        params:
            team_id:
                type: bigint
                required: true
                default: null
                enum: []
                min: null
                max: null
        returns:
            type: row
            schema:
                completed_count: bigint
                member_count: bigint
                todo_count: bigint
        auth_required: true
