services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: ultrabase
      POSTGRES_PASSWORD: ultrabase
      POSTGRES_DB: ultrabase
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./scripts/postgres-init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "ultrabase"]
      interval: 2s
      timeout: 3s
      retries: 10

  backend:
    build:
      context: .
      # Skip the embedded SPA in dev — the `dashboard` service below runs
      # vite with HMR on :5173, which is what dev should hit. Keeping the
      # embed off here also keeps the backend image rebuild fast.
      args:
        WITH_DASHBOARD: "false"
    ports:
      - "8080:8080"
    environment:
      INSTANCEZ_OWNER_DATABASE_URL: postgres://ultrabase_owner:ultrabase@postgres:5432/ultrabase?sslmode=disable
      INSTANCEZ_AUTH_DATABASE_URL: postgres://authenticator:ultrabase@postgres:5432/ultrabase?sslmode=disable
      INSTANCEZ_ADMIN_KEY: ultrabase-dev-key
      JWT_SECRET: dev-jwt-secret-change-me
    volumes:
      - ./instancez.yaml:/app/instancez.yaml
    depends_on:
      postgres:
        condition: service_healthy

  dashboard:
    build: ./dashboard
    ports:
      - "5173:5173"
    environment:
      API_URL: http://backend:8080
    volumes:
      - ./dashboard/src:/app/src
      - ./dashboard/index.html:/app/index.html
    depends_on:
      - backend

volumes:
  pgdata:
