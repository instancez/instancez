apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "instancez.fullname" . }}
  labels:
    {{- include "instancez.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "instancez.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "instancez.selectorLabels" . | nindent 8 }}
    spec:
      containers:
        - name: instancez
          image: "{{ .Values.image.repository }}:{{ include "instancez.imageTag" . }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          env:
            - name: INSTANCEZ_DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: {{ include "instancez.fullname" . }}
                  key: databaseUrl
            - name: INSTANCEZ_ADMIN_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "instancez.fullname" . }}
                  key: adminKey
            - name: INSTANCEZ_JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ include "instancez.fullname" . }}
                  key: jwtSecret
          volumeMounts:
            - name: config
              mountPath: /app/instancez.yaml
              subPath: instancez.yaml
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
      volumes:
        - name: config
          configMap:
            name: {{ include "instancez.fullname" . }}-config
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
