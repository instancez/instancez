{{- $fullname := include "instancez.fullname" . }}
{{- $existing := lookup "v1" "Secret" .Release.Namespace $fullname }}

{{- $adminKey := .Values.adminKey }}
{{- if not $adminKey }}
  {{- if $existing }}
    {{- $adminKey = index $existing.data "adminKey" | b64dec }}
  {{- else }}
    {{- $adminKey = randAlphaNum 32 }}
  {{- end }}
{{- end }}

{{- $jwtSecret := .Values.jwtSecret }}
{{- if not $jwtSecret }}
  {{- if $existing }}
    {{- $jwtSecret = index $existing.data "jwtSecret" | b64dec }}
  {{- else }}
    {{- $jwtSecret = randAlphaNum 32 }}
  {{- end }}
{{- end }}

{{- $postgresPassword := .Values.postgres.password }}
{{- if not $postgresPassword }}
  {{- if $existing }}
    {{- $postgresPassword = index $existing.data "postgresPassword" | b64dec }}
  {{- else }}
    {{- $postgresPassword = randAlphaNum 32 }}
  {{- end }}
{{- end }}

{{- $databaseUrl := "" }}
{{- if .Values.postgres.enabled }}
  {{- $databaseUrl = printf "postgres://%s:%s@%s:5432/%s?sslmode=disable" .Values.postgres.username $postgresPassword (include "instancez.postgresServiceName" .) .Values.postgres.database }}
{{- else }}
  {{- $databaseUrl = .Values.externalPostgres.url }}
{{- end }}

apiVersion: v1
kind: Secret
metadata:
  name: {{ $fullname }}
  labels:
    {{- include "instancez.labels" . | nindent 4 }}
type: Opaque
data:
  adminKey: {{ $adminKey | b64enc | quote }}
  jwtSecret: {{ $jwtSecret | b64enc | quote }}
  postgresPassword: {{ $postgresPassword | b64enc | quote }}
  databaseUrl: {{ $databaseUrl | b64enc | quote }}
