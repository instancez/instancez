{{- $fullname := include "instancez.fullname" . }}
{{- $existing := lookup "v1" "Secret" .Release.Namespace $fullname }}

{{/*
  Auto-generation pattern: for each sensitive value, we check in order:
  1. User-provided value in values.yaml
  2. Existing value in the cluster Secret (stable across helm upgrade)
  3. Freshly generated random string (first install only)
  This uses Helm's `lookup` function to read the current cluster state.
*/}}

{{- $publishableKey := .Values.publishableKey }}
{{- if not $publishableKey }}
  {{- if $existing }}
    {{- $publishableKey = index $existing.data "publishableKey" | b64dec }}
  {{- else }}
    {{- $publishableKey = printf "inz_publishable_%s" (randAlphaNum 32) }}
  {{- end }}
{{- end }}

{{- $secretKey := .Values.secretKey }}
{{- if not $secretKey }}
  {{- if $existing }}
    {{- $secretKey = index $existing.data "secretKey" | b64dec }}
  {{- else }}
    {{- $secretKey = printf "inz_secret_%s" (randAlphaNum 32) }}
  {{- end }}
{{- end }}

{{- $postgresPassword := .Values.postgres.password }}
{{- if not $postgresPassword }}
  {{- if $existing }}
    {{- $postgresPassword = index $existing.data "postgresPassword" | b64dec }}
  {{- else }}
    {{- $postgresPassword = randAlphaNum 32 }}
  {{- end }}
{{- end }}

{{- $databaseUrl := "" }}
{{- if .Values.postgres.enabled }}
  {{- $databaseUrl = printf "postgres://%s:%s@%s:5432/%s?sslmode=disable" .Values.postgres.username $postgresPassword (include "instancez.postgresServiceName" .) .Values.postgres.database }}
{{- else }}
  {{- $databaseUrl = .Values.externalPostgres.url }}
{{- end }}

apiVersion: v1
kind: Secret
metadata:
  name: {{ $fullname }}
  labels:
    {{- include "instancez.labels" . | nindent 4 }}
type: Opaque
data:
  publishableKey: {{ $publishableKey | b64enc | quote }}
  secretKey: {{ $secretKey | b64enc | quote }}
  postgresPassword: {{ $postgresPassword | b64enc | quote }}
  databaseUrl: {{ $databaseUrl | b64enc | quote }}
