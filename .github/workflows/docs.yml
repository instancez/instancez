name: Deploy docs

on:
  push:
    branches: [main]
    paths:
      - 'docs/site/**'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      # fetch-depth: 0 pulls tags too, so the version badge can resolve the
      # latest release via `git describe` (SiteTitle.astro, index.astro).
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: docs/site/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: docs/site

      - name: Build
        run: npm run build
        working-directory: docs/site
        env:
          DOCS_VERSION: ${{ github.ref_type == 'tag' && github.ref_name || '' }}

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/site/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
