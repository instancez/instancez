name: CI / Publish

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

env:
  IMAGE: ghcr.io/${{ github.repository }}
  # On pull_request, GITHUB_SHA is the merge commit; Codacy wants the PR head so
  # coverage attaches to the commit the PR actually shows. Falls back to the
  # pushed SHA for push/tag events.
  CODACY_COMMIT: ${{ github.event.pull_request.head.sha || github.sha }}
  # Account API-token flow: the reporter resolves the project from provider +
  # org + name. The token is set per-job so fork PRs (no secrets) skip cleanly.
  CODACY_ORGANIZATION_PROVIDER: gh
  CODACY_USERNAME: instancez
  CODACY_PROJECT_NAME: instancez

jobs:
  go-unit:
    name: Go unit tests
    runs-on: ubuntu-latest
    env:
      CODACY_API_TOKEN: ${{ secrets.CODACY_API_TOKEN }}
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-go@v6
        with:
          go-version: '1.25'
          cache: true
      - run: go build ./...
      - run: go test -race -covermode=atomic -coverpkg=./... -coverprofile=coverage-unit.out ./...
      - name: Upload coverage to Codacy (partial)
        if: env.CODACY_API_TOKEN != ''
        run: |
          bash <(curl -Ls https://coverage.codacy.com/get.sh) report \
            --commit-uuid "$CODACY_COMMIT" \
            --force-coverage-parser go -r coverage-unit.out --partial

  go-integration:
    # Compatibility matrix: every Postgres major we support gets a full run on
    # the shipped Node, and every supported Node major gets a run on the default
    # Postgres. The cartesian product would be wasteful, so the extra Node
    # versions ride the include list against pg=16 only. matrix.pg drives both
    # the service container and the testcontainer image (INSTANCEZ_TEST_PG_IMAGE);
    # matrix.node drives the runtime that executes code-function workers and the
    # supabase-js harness. fail-fast is off so one bad combo doesn't mask others.
    name: Go integration tests (pg${{ matrix.pg }}, node${{ matrix.node }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        pg: ['14', '15', '16', '17']
        node: ['22']
        include:
          - pg: '16'
            node: '24'
    services:
      postgres:
        image: postgres:${{ matrix.pg }}
        env:
          POSTGRES_USER: instancez
          POSTGRES_PASSWORD: instancez
          POSTGRES_DB: instancez
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U instancez"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      INSTANCEZ_TEST_DATABASE_URL: postgres://instancez:instancez@localhost:5432/instancez?sslmode=disable
      INSTANCEZ_TEST_PG_IMAGE: postgres:${{ matrix.pg }}-alpine
      CODACY_API_TOKEN: ${{ secrets.CODACY_API_TOKEN }}
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-go@v6
        with:
          go-version: '1.25'
          cache: true
      - uses: actions/setup-node@v5
        with:
          node-version: ${{ matrix.node }}
          cache: npm
          cache-dependency-path: test/integration/supabase-js/package-lock.json
      # Coverage is uploaded from a single canonical leg only; the other matrix
      # combos exist to catch version skew, not to re-measure the same lines.
      - name: Run integration tests (with coverage on canonical leg)
        run: |
          if [ "${{ matrix.pg }}" = "16" ] && [ "${{ matrix.node }}" = "22" ]; then
            go test -tags=integration -race -covermode=atomic -coverpkg=./... \
              -coverprofile=coverage-integration.out ./...
          else
            go test -tags=integration -race ./...
          fi
      - name: Upload coverage to Codacy (partial)
        if: env.CODACY_API_TOKEN != '' && matrix.pg == '16' && matrix.node == '22'
        run: |
          bash <(curl -Ls https://coverage.codacy.com/get.sh) report \
            --commit-uuid "$CODACY_COMMIT" \
            --force-coverage-parser go -r coverage-integration.out --partial

  dashboard:
    name: Dashboard tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: dashboard
    env:
      CODACY_API_TOKEN: ${{ secrets.CODACY_API_TOKEN }}
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: dashboard/package-lock.json
      - run: npm ci
      - run: npm run test:coverage
      - run: npm run build
      - name: Upload coverage to Codacy (partial)
        if: env.CODACY_API_TOKEN != ''
        working-directory: .
        run: |
          # vitest emits repo-relative-to-dashboard paths (SF:src/...); Codacy
          # matches against repo root, so prefix them or the whole dashboard
          # reads as unmatched (silently zero coverage).
          sed -i 's|^SF:|SF:dashboard/|' dashboard/coverage/lcov.info
          bash <(curl -Ls https://coverage.codacy.com/get.sh) report \
            --commit-uuid "$CODACY_COMMIT" \
            -r dashboard/coverage/lcov.info --partial

  e2e:
    # Full-stack smoke: build the dashboard dist, embed it in the inz binary,
    # boot `serve` against the postgres service (superuser DSN → serve
    # self-provisions roles), then drive the shipped SPA with Playwright. This
    # is the only job that exercises binary + HTTP + Postgres + embedded SPA as
    # one unit. Kept separate from the vitest `dashboard` job, which is pure
    # jsdom with no backend.
    name: Dashboard e2e (smoke)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: instancez
          POSTGRES_PASSWORD: instancez
          POSTGRES_DB: instancez
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U instancez"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      INSTANCEZ_TEST_DATABASE_URL: postgres://instancez:instancez@localhost:5432/instancez?sslmode=disable
      INSTANCEZ_PUBLISHABLE_KEY: inz_publishable_e2e
      INSTANCEZ_SECRET_KEY: inz_secret_e2e
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-go@v6
        with:
          go-version: '1.25'
          cache: true
      - uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: dashboard/package-lock.json
      - name: Install dashboard deps
        run: npm ci
        working-directory: dashboard
      - name: Build dashboard dist
        run: npm run build
        working-directory: dashboard
      - name: Build inz (embeds the dist)
        run: go build -o inz ./cmd/inz
      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium
        working-directory: dashboard
      - name: Run e2e smoke
        run: npm run test:e2e
        working-directory: dashboard

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-go@v6
        with:
          go-version: '1.25'
          cache: true
      - uses: golangci/golangci-lint-action@v9
        with:
          version: v2.12.2

  ci-gate:
    # Single stable required-check for branch protection. The test/lint jobs
    # fan out (the integration matrix alone is five legs with templated names);
    # requiring this one aggregator instead means the ruleset survives matrix
    # changes. `if: always()` so it runs even when a dependency fails, then it
    # fails itself unless every dependency succeeded.
    name: CI gate
    if: always()
    needs: [go-unit, go-integration, dashboard, e2e, lint]
    runs-on: ubuntu-latest
    steps:
      - if: contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled')
        run: exit 1

  codacy-final:
    # Codacy merges per-commit coverage from partial reports; this flips the
    # commit to "complete" once every partial has landed. Guarded on the token
    # so fork PRs (which don't receive secrets) skip cleanly instead of failing.
    name: Finalize Codacy coverage
    needs: [go-unit, go-integration, dashboard]
    runs-on: ubuntu-latest
    env:
      CODACY_API_TOKEN: ${{ secrets.CODACY_API_TOKEN }}
    steps:
      - name: Finalize coverage
        if: env.CODACY_API_TOKEN != ''
        run: bash <(curl -Ls https://coverage.codacy.com/get.sh) final --commit-uuid "$CODACY_COMMIT"

  images:
    name: Publish Images
    needs: [go-unit, go-integration, dashboard, lint, e2e]
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v5

      - name: Resolve version
        id: version
        run: |
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            echo "version=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT
          else
            echo "version=dev-${GITHUB_SHA::7}" >> $GITHUB_OUTPUT
          fi

      - name: Login to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata (OCI labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE }}
          tags: |
            type=raw,value=${{ steps.version.outputs.version }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      # Unsuffixed tag == standalone (the default flavor).
      - name: Build and push standalone image (multi-arch)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          provenance: false
          cache-from: type=gha,scope=standalone
          cache-to: type=gha,mode=max,scope=standalone
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VERSION=${{ steps.version.outputs.version }}
            COMMIT=${{ github.sha }}
          tags: |
            ${{ env.IMAGE }}:${{ steps.version.outputs.version }}
            ${{ env.IMAGE }}:${{ steps.version.outputs.version }}-standalone

      # Multi-arch is fine on ghcr: Lambda never pulls this tag. The per-arch
      # ECR images Lambda runs are built by instancez-platform.
      - name: Build and push Lambda image (multi-arch)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.lambda
          platforms: linux/amd64,linux/arm64
          push: true
          provenance: false
          cache-from: type=gha,scope=lambda
          cache-to: type=gha,mode=max,scope=lambda
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VERSION=${{ steps.version.outputs.version }}
            COMMIT=${{ github.sha }}
          tags: ${{ env.IMAGE }}:${{ steps.version.outputs.version }}-lambda

  binaries:
    name: Release Binaries
    needs: [go-unit, go-integration, dashboard, lint, e2e]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: dashboard/package-lock.json

      # The binary embeds dashboard/dist (//go:embed); one build serves all
      # target platforms since the dist is arch-independent.
      - name: Build dashboard
        run: |
          cd dashboard
          npm ci
          npm run build

      - uses: actions/setup-go@v6
        with:
          go-version: "1.25"
          cache: true

      - name: Build binaries
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          LDFLAGS="-s -w -X github.com/instancez/instancez/internal/cli.version=${VERSION} -X github.com/instancez/instancez/internal/cli.commit=${GITHUB_SHA}"
          mkdir -p dist
          for os in linux darwin windows; do
            for arch in amd64 arm64; do
              ext=""
              [ "$os" = "windows" ] && ext=".exe"
              out="dist/inz_${VERSION}_${os}_${arch}${ext}"
              CGO_ENABLED=0 GOOS=$os GOARCH=$arch \
                go build -ldflags "$LDFLAGS" -o "$out" ./cmd/inz
              # Stable, version-less copy so the installer can pull a fixed URL:
              # github.com/instancez/instancez/releases/latest/download/inz_<os>_<arch>
              cp "$out" "dist/inz_${os}_${arch}${ext}"
            done
          done
          (cd dist && sha256sum -- * > checksums.txt)

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # Idempotent on re-runs: if the release already exists, refresh assets.
          gh release create "$GITHUB_REF_NAME" --generate-notes dist/* \
            || gh release upload "$GITHUB_REF_NAME" dist/* --clobber
