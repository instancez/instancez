name: CI / Publish

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
  workflow_dispatch:

env:
  IMAGE: ghcr.io/${{ github.repository }}

jobs:
  go-unit:
    name: Go unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache: true
      - run: go build ./...
      - run: go test -race ./...

  go-integration:
    name: Go integration tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: instancez
          POSTGRES_PASSWORD: instancez
          POSTGRES_DB: instancez
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U instancez"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      INSTANCEZ_TEST_DATABASE_URL: postgres://instancez:instancez@localhost:5432/instancez?sslmode=disable
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache: true
      - run: go test -tags=integration -race ./...

  dashboard:
    name: Dashboard tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: dashboard
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: dashboard/package-lock.json
      - run: npm ci
      - run: npm test
      - run: npm run build

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache: true
      - uses: golangci/golangci-lint-action@v8
        with:
          version: latest

  images:
    name: Publish Images
    needs: [go-unit, go-integration, dashboard]
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Resolve version
        id: version
        run: |
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            echo "version=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT
          else
            echo "version=dev-${GITHUB_SHA::7}" >> $GITHUB_OUTPUT
          fi

      - name: Login to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata (OCI labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE }}
          tags: |
            type=raw,value=${{ steps.version.outputs.version }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      # Unsuffixed tag == standalone (the default flavor).
      - name: Build and push standalone image (multi-arch)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          provenance: false
          cache-from: type=gha,scope=standalone
          cache-to: type=gha,mode=max,scope=standalone
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VERSION=${{ steps.version.outputs.version }}
            COMMIT=${{ github.sha }}
          tags: |
            ${{ env.IMAGE }}:${{ steps.version.outputs.version }}
            ${{ env.IMAGE }}:${{ steps.version.outputs.version }}-standalone

      # Multi-arch is fine on ghcr: Lambda never pulls this tag. The per-arch
      # ECR images Lambda runs are built by instancez-platform.
      - name: Build and push Lambda image (multi-arch)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.lambda
          platforms: linux/amd64,linux/arm64
          push: true
          provenance: false
          cache-from: type=gha,scope=lambda
          cache-to: type=gha,mode=max,scope=lambda
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VERSION=${{ steps.version.outputs.version }}
            COMMIT=${{ github.sha }}
          tags: ${{ env.IMAGE }}:${{ steps.version.outputs.version }}-lambda

  binaries:
    name: Release Binaries
    needs: [go-unit, go-integration, dashboard]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: dashboard/package-lock.json

      # The binary embeds dashboard/dist (//go:embed); one build serves all
      # target platforms since the dist is arch-independent.
      - name: Build dashboard
        run: |
          cd dashboard
          npm ci
          npm run build

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache: true

      - name: Build binaries
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          LDFLAGS="-s -w -X github.com/instancez/instancez/internal/cli.version=${VERSION} -X github.com/instancez/instancez/internal/cli.commit=${GITHUB_SHA}"
          mkdir -p dist
          for os in linux darwin windows; do
            for arch in amd64 arm64; do
              bin="inz"
              [ "$os" = "windows" ] && bin="inz.exe"
              CGO_ENABLED=0 GOOS=$os GOARCH=$arch \
                go build -ldflags "$LDFLAGS" -o "$bin" ./cmd/inz
              if [ "$os" = "windows" ]; then
                zip -q "dist/inz_${VERSION}_${os}_${arch}.zip" "$bin"
              else
                tar -czf "dist/inz_${VERSION}_${os}_${arch}.tar.gz" "$bin"
              fi
              rm "$bin"
            done
          done
          (cd dist && sha256sum -- * > checksums.txt)

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # Idempotent on re-runs: if the release already exists, refresh assets.
          gh release create "$GITHUB_REF_NAME" --generate-notes dist/* \
            || gh release upload "$GITHUB_REF_NAME" dist/* --clobber
