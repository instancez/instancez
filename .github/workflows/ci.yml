name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  go-unit:
    name: Go unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache: true
      - run: go build ./...
      - run: go test -race ./...

  go-integration:
    name: Go integration tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: ultrabase
          POSTGRES_PASSWORD: ultrabase
          POSTGRES_DB: ultrabase
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U ultrabase"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgres://ultrabase:ultrabase@localhost:5432/ultrabase?sslmode=disable
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache: true
      - run: go test -tags=integration -race ./...

  dashboard:
    name: Dashboard tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: dashboard
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: dashboard/package-lock.json
      - run: npm ci
      - run: npm test
