name: Build Docker Images

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Environment to deploy"
        required: true
        type: choice
        options:
          - dev
          - prod
  workflow_call:
    inputs:
      environment:
        description: "Environment to deploy"
        required: true
        type: string
    outputs:
      image_uri:
        description: "Docker image URI (tag: <sha>)"
        value: ${{ jobs.build.outputs.image_uri }}
      lambda_image_uri:
        description: "Lambda-compatible Docker image URI (tag: <sha>-lambda)"
        value: ${{ jobs.build.outputs.lambda_image_uri }}

env:
  AWS_REGION: us-east-1

jobs:
  check-ci:
    name: Check CI Status
    runs-on: ubuntu-latest
    permissions:
      checks: read
    outputs:
      tests_passed: ${{ steps.check.outputs.passed }}
    steps:
      - name: Check if CI already passed for this commit
        id: check
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          RESULT=$(gh api repos/${{ github.repository }}/commits/${{ github.sha }}/check-runs \
            --jq '[.check_runs[] | select(.name == "Go unit tests" or .name == "Go integration tests" or .name == "Dashboard tests")] | if length >= 3 and all(.conclusion == "success") then "true" else "false" end')
          echo "passed=${RESULT}" >> $GITHUB_OUTPUT

  test:
    name: Run Tests
    needs: check-ci
    if: needs.check-ci.outputs.tests_passed != 'true'
    uses: ./.github/workflows/ci.yml

  build:
    needs: [check-ci, test]
    if: always() && (needs.test.result == 'success' || needs.test.result == 'skipped')
    name: Build Images
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    permissions:
      contents: read
      id-token: write
    outputs:
      image_uri: ${{ steps.set-uri.outputs.image_uri }}
      lambda_image_uri: ${{ steps.set-uri.outputs.lambda_image_uri }}
    steps:
      - uses: actions/checkout@v4

      - name: Set short SHA
        id: vars
        run: echo "short_sha=${GITHUB_SHA::7}" >> $GITHUB_OUTPUT

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set environment
        id: env
        run: echo "env=${{ inputs.environment }}" >> $GITHUB_OUTPUT

      - name: Build and push regular image
        run: |
          IMAGE=${{ steps.login-ecr.outputs.registry }}/ultrabase/${{ steps.env.outputs.env }}:${{ steps.vars.outputs.short_sha }}
          docker build --provenance=false -t $IMAGE .
          docker push $IMAGE

      - name: Build and push Lambda image
        run: |
          IMAGE=${{ steps.login-ecr.outputs.registry }}/ultrabase/${{ steps.env.outputs.env }}:${{ steps.vars.outputs.short_sha }}-lambda
          docker build --provenance=false -f Dockerfile.lambda -t $IMAGE .
          docker push $IMAGE

      - name: Set image URIs
        id: set-uri
        run: |
          REGISTRY=${{ steps.login-ecr.outputs.registry }}
          ENV=${{ steps.env.outputs.env }}
          SHA=${{ steps.vars.outputs.short_sha }}
          echo "image_uri=${REGISTRY}/ultrabase/${ENV}:${SHA}" >> $GITHUB_OUTPUT
          echo "lambda_image_uri=${REGISTRY}/ultrabase/${ENV}:${SHA}-lambda" >> $GITHUB_OUTPUT
