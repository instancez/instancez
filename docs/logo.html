<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ultrabase — Logo</title>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0E0B14;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;font-family:'Sora',sans-serif}

.logo{display:flex;flex-direction:column;align-items:center;gap:28px;opacity:0;animation:fadeIn 1s .2s forwards}
@keyframes fadeIn{from{opacity:0;transform:scale(.95)}to{opacity:1;transform:scale(1)}}

.mark{width:100px;height:100px;border-radius:22px;background:linear-gradient(135deg,#1D1616,#8E1616,#D84040);box-shadow:0 8px 40px rgba(142,22,22,.3),0 2px 8px rgba(216,64,64,.15);position:relative;overflow:hidden}
.mark .cutout{position:absolute;top:-10px;left:50%;transform:translateX(-50%);width:40px;height:74px;background:#0E0B14;border-radius:0 0 20px 20px;z-index:2}

.wordmark{font-size:32px;font-weight:600;letter-spacing:-.5px;background:linear-gradient(90deg,#8E1616,#D84040);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
</style>
</head>
<body>
<div class="logo">
  <div class="mark"><div class="cutout"></div></div>
  <div class="wordmark">ultrabase</div>
</div>
</body>
</html>
