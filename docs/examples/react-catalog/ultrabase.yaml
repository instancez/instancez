version: 1
project:
    name: React Catalog Example
    description: Product catalog demonstrating Ultrabase + supabase-js (auth, filtering, FTS, JSONB, arrays, embeds, RLS, file storage)
extensions:
    - pgcrypto
    - pg_trgm
server:
    port: 8080
    cors:
        origins:
            - '*'
        methods:
            - GET
            - POST
            - PATCH
            - PUT
            - DELETE
            - OPTIONS
            - HEAD
        headers:
            - Authorization
            - Content-Type
            - Prefer
            - Range
            - Range-Unit
            - apikey
            - x-client-info
        credentials: false
        max_age: 86400
    docs_ui: true
    max_limit: 1000
providers:
    email: null
    storage:
        type: local
auth:
    # Email + password auth. VerifyEmail is off so signup returns a session
    # immediately; no email provider is required in that mode.
    jwt_expiry: 1h
    refresh_tokens: true
    refresh_token_expiry: 7d
tables:
    users:
        fields:
            - name: display_name
              type: text
              required: false
    categories:
        fields:
            - name: id
              type: bigserial
              primary_key: true
            - name: slug
              type: varchar(63)
              required: true
              unique: true
            - name: name
              type: text
              required: true
        indexes: []
        rls:
            - operations:
                - select
                - insert
                - update
                - delete
              check: "true"
        allow_anon: true

    products:
        fields:
            - name: id
              type: bigserial
              primary_key: true
            - name: name
              type: text
              required: true
            - name: description
              type: text
              required: false
            - name: price_cents
              type: integer
              required: true
              min: 0
            - name: stock
              type: integer
              required: true
              default: 0
              min: 0
            - name: status
              type: text
              required: true
              default: draft
              enum:
                  - draft
                  - active
                  - archived
            - name: featured
              type: boolean
              required: true
              default: false
            - name: on_sale
              type: boolean
              required: true
              default: false
            - name: tags
              type: text[]
              required: false
            - name: metadata
              type: jsonb
              required: false
            - name: category_id
              type: ""
              required: false
              foreign_key:
                  references: categories.id
                  on_delete: set_null
            - name: created_at
              type: timestamptz
              required: true
              default: now()
        indexes:
            - columns:
                - status
                - created_at
            - columns:
                - category_id
            - columns:
                - price_cents
        rls:
            - operations:
                - select
                - insert
                - update
                - delete
              check: "true"
        allow_anon: true
        searchable:
            - name
            - description
        search_config: english

    reviews:
        fields:
            - name: id
              type: bigserial
              primary_key: true
            - name: product_id
              type: ""
              required: true
              foreign_key:
                  references: products.id
                  on_delete: cascade
            - name: user_id
              type: ""
              required: false
              foreign_key:
                  references: users.id
                  on_delete: set_null
            - name: author
              type: text
              required: true
            - name: rating
              type: integer
              required: true
              min: 1
              max: 5
            - name: body
              type: text
              required: false
            - name: created_at
              type: timestamptz
              required: true
              default: now()
        indexes:
            - columns:
                - product_id
                - created_at
            - columns:
                - rating
            - columns:
                - user_id
        # Anyone can read reviews (public product catalog). Only authenticated
        # users can insert, and only against their own user_id. Updates and
        # deletes are restricted to the row owner via auth.uid().
        rls:
            - operations:
                - select
              check: "true"
            - operations:
                - insert
              check: "user_id = auth.uid()"
            - operations:
                - update
                - delete
              check: "user_id = auth.uid()"
        allow_anon: true

storage:
    product_images:
        max_size: 5MB
        public: true

