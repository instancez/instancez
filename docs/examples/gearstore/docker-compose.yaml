services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: instancez
      POSTGRES_PASSWORD: instancez
      POSTGRES_DB: instancez
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./postgres-init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "instancez"]
      interval: 2s
      timeout: 3s
      retries: 10

  instancez:
    build:
      context: ../../..
      dockerfile: Dockerfile
    # `dev` migrates and builds the code functions on the fly (runs
    # `npm ci` in /app/functions). `serve` is the production mode, but it never
    # builds functions — it consumes a pre-built bundle from `inz deploy`.
    command: ["inz", "dev"]
    ports:
      - "8080:8080"
    environment:
      INSTANCEZ_OWNER_DATABASE_URL: postgres://instancez_owner:instancez@postgres:5432/instancez?sslmode=disable
      INSTANCEZ_AUTH_DATABASE_URL: postgres://authenticator:instancez@postgres:5432/instancez?sslmode=disable
      INSTANCEZ_ADMIN_KEY: instancez-dev-key
      JWT_SECRET: dev-jwt-secret-change-me
    volumes:
      - ./instancez.yaml:/app/instancez.yaml
      - ./functions:/app/functions   # code functions; `inz dev` runs npm ci here
    depends_on:
      postgres:
        condition: service_healthy

  web:
    build: .
    ports:
      - "5174:5174"
    environment:
      VITE_PROXY_TARGET: http://instancez:8080
      # Exposed only because this is a localhost dev demo: the magic-link
      # and email-OTP tabs call /auth/v1/admin/generate_link to surface the
      # token that would normally arrive by email. Never ship an admin key
      # to a real browser.
      VITE_INSTANCEZ_ADMIN_KEY: instancez-dev-key
    volumes:
      - ./src:/app/src
      - ./index.html:/app/index.html
      - ./vite.config.js:/app/vite.config.js
    depends_on:
      - instancez

volumes:
  pgdata:
